<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; font-src 'self' data:; img-src 'self' data:;">
<title>VersePC Editor</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1e1e1e; color: #ccc; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
.tabs-bar { height: 35px; background: #252526; display: flex; align-items: center; padding: 0 8px; gap: 4px; overflow-x: auto; flex-shrink: 0; border-bottom: 1px solid #333; }
.tab-action-btn { background: none; border: none; color: #999; cursor: pointer; padding: 4px 6px; font-size: 13px; border-radius: 4px; flex-shrink: 0; }
.tab-action-btn:hover { background: #3c3c3c; color: #fff; }
.tab { height: 30px; padding: 0 12px; display: flex; align-items: center; gap: 6px; font-size: 12px; color: #999; background: #2d2d2d; cursor: pointer; border-radius: 6px 6px 0 0; min-width: 80px; max-width: 180px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; position: relative; }
.tab.active { background: #1e1e1e; color: #fff; }
.tab .tab-close { opacity: 0; border: none; background: none; color: #999; cursor: pointer; font-size: 14px; padding: 0 2px; border-radius: 3px; }
.tab:hover .tab-close { opacity: 1; }
.tab .tab-close:hover { background: #5a5a5a; color: #fff; }
.tab .modified-dot { width: 8px; height: 8px; border-radius: 50%; background: #e8e8e8; display: none; }
.tab.modified .modified-dot { display: block; }
.editor-container { flex: 1; overflow: hidden; min-height: 0; }
.statusbar { height: 22px; background: #007acc; display: flex; align-items: center; padding: 0 10px; font-size: 11px; color: #fff; gap: 16px; flex-shrink: 0; }
.statusbar-item { display: flex; align-items: center; gap: 4px; }
.welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #666; gap: 12px; }
.welcome h2 { font-size: 20px; font-weight: 300; color: #888; }
.welcome p { font-size: 13px; }
.welcome kbd { background: #333; padding: 2px 8px; border-radius: 3px; font-size: 12px; border: 1px solid #555; }
.diff-toolbar { height: 40px; background: #252526; display: none; align-items: center; padding: 0 12px; gap: 8px; border-bottom: 1px solid #333; flex-shrink: 0; }
.diff-toolbar.visible { display: flex; }
.diff-toolbar-label { font-size: 12px; color: #ccc; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.diff-toolbar-label span { color: #4ec9b0; }
.diff-btn { padding: 5px 14px; border: none; border-radius: 4px; font-size: 12px; cursor: pointer; font-weight: 500; }
.diff-btn-accept { background: #0e7a0d; color: #fff; }
.diff-btn-accept:hover { background: #118210; }
.diff-btn-reject { background: #5a3e3e; color: #ccc; }
.diff-btn-reject:hover { background: #6e4a4a; }
.diff-btn-apply { background: #0078d4; color: #fff; }
.diff-btn-apply:hover { background: #1a8bea; }
.terminal-panel { height: 0; background: #1e1e1e; border-top: 1px solid #333; display: flex; flex-direction: column; overflow: hidden; transition: height 0.2s ease; }
.terminal-panel.open { height: 220px; }
.terminal-header { height: 30px; background: #252526; display: flex; align-items: center; padding: 0 12px; gap: 8px; flex-shrink: 0; border-bottom: 1px solid #333; }
.terminal-header-title { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }
.terminal-header-btn { background: none; border: none; color: #999; cursor: pointer; padding: 2px 6px; border-radius: 3px; font-size: 12px; }
.terminal-header-btn:hover { background: #3c3c3c; color: #fff; }
.terminal-header-btn.active { color: #0078d4; }
.terminal-drag-handle { height: 4px; cursor: row-resize; background: transparent; flex-shrink: 0; }
.terminal-drag-handle:hover { background: #0078d4; }
.terminal-body { flex: 1; overflow: hidden; }
.terminal-hint { padding: 12px; color: #666; font-size: 12px; text-align: center; }
.quickopen-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 200; justify-content: center; padding-top: 80px; }
.quickopen-overlay.visible { display: flex; }
.quickopen-box { width: 520px; max-height: 400px; background: #252526; border: 1px solid #444; border-radius: 8px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); display: flex; flex-direction: column; overflow: hidden; }
.quickopen-input { width: 100%; padding: 10px 14px; background: #3c3c3c; border: none; border-bottom: 1px solid #444; color: #fff; font-size: 14px; outline: none; font-family: inherit; }
.quickopen-input::placeholder { color: #888; }
.quickopen-list { flex: 1; overflow-y: auto; max-height: 340px; }
.quickopen-item { padding: 6px 14px; font-size: 13px; color: #ccc; cursor: pointer; display: flex; align-items: center; gap: 8px; }
.quickopen-item:hover, .quickopen-item.selected { background: #094771; color: #fff; }
.quickopen-item .qo-icon { font-size: 12px; opacity: 0.7; }
.quickopen-item .qo-path { font-size: 11px; color: #888; margin-left: auto; }
.quickopen-empty { padding: 16px; text-align: center; color: #666; font-size: 12px; }
.ai-modified-line { background: rgba(96, 165, 250, 0.08) !important; }
.ai-modified-glyph { background: #60a5fa; border-radius: 50%; width: 8px !important; height: 8px !important; margin-left: 4px; margin-top: 6px; }
.statusbar-btn { cursor: pointer; padding: 0 8px; border-radius: 3px; transition: background 0.15s; }
.statusbar-btn:hover { background: rgba(255,255,255,0.15); }
.statusbar-ai-mark { color: #60a5fa; font-weight: 600; }
</style>
</head>
<body>
<div class="tabs-bar">
    <button class="tab-action-btn" onclick="openFile()" title="打开文件 Ctrl+O">📂</button>
    <button class="tab-action-btn" onclick="saveCurrentFile()" title="保存 Ctrl+S">💾</button>
    <div id="tabsBar" style="display:flex;align-items:flex-end;gap:1px;overflow-x:auto;flex:1"></div>
</div>
<div class="diff-toolbar" id="diffToolbar">
    <span class="diff-toolbar-label" id="diffLabel">AI 修改: <span id="diffFileName">-</span></span>
    <button class="diff-btn diff-btn-reject" onclick="rejectDiff()">✕ 拒绝</button>
    <button class="diff-btn diff-btn-apply" onclick="applyDiff()">→ 应用到编辑器</button>
    <button class="diff-btn diff-btn-accept" onclick="acceptDiff()">✓ 接受并保存</button>
</div>
<div class="editor-container" id="editorContainer">
    <div class="welcome" id="welcomeScreen">
        <h2>VersePC Editor</h2>
        <p>拖拽文件到此处，或点击 <kbd>📂 打开</kbd> 加载文件</p>
        <p style="margin-top:8px; font-size:12px; color:#555">Ctrl+S 保存 · Ctrl+P 快速打开 · Ctrl+Z 撤销</p>
    </div>
</div>
<div class="terminal-drag-handle" id="terminalDragHandle"></div>
<div class="terminal-panel" id="terminalPanel">
    <div class="terminal-header">
        <span class="terminal-header-title">终端</span>
        <button class="terminal-header-btn" id="btnTerminalToggle" onclick="toggleTerminal()" title="Ctrl+`">🖥️</button>
        <button class="terminal-header-btn" onclick="createTerminal()" title="新建终端">+</button>
        <button class="terminal-header-btn" onclick="clearTerminal()" title="清空">🗑️</button>
    </div>
    <div class="terminal-body" id="terminalBody">
        <div class="terminal-hint" id="terminalHint">点击 🖥️ 或按 Ctrl+` 打开终端</div>
    </div>
</div>
<div class="quickopen-overlay" id="quickopenOverlay">
    <div class="quickopen-box">
        <input class="quickopen-input" id="quickopenInput" placeholder="搜索文件名..." />
        <div class="quickopen-list" id="quickopenList"></div>
    </div>
</div>
<div class="statusbar">
    <span class="statusbar-item" id="statusLang">Plain Text</span>
    <span class="statusbar-item" id="statusPos">Ln 1, Col 1</span>
    <span class="statusbar-item statusbar-ai-mark" id="statusAIMark" style="display:none" title="AI 修改标记">● AI 修改</span>
    <span style="flex:1"></span>
    <span class="statusbar-item statusbar-btn" id="statusCompletion" title="AI 代码补全 (Ctrl+Shift+Space)">AI 补全</span>
    <span class="statusbar-item statusbar-btn" id="statusSendToAI" title="发送选中代码到 AI (Ctrl+Shift+I)" style="cursor:pointer;opacity:0.6;" onclick="sendSelectionToAI()">AI 修改</span>
    <span class="statusbar-item statusbar-btn" id="btnTerminalStatus" onclick="toggleTerminal()" title="切换终端 (Ctrl+`)">🖥️ 终端</span>
    <span class="statusbar-item" id="statusEncoding">UTF-8</span>
    <span class="statusbar-item" id="statusEOL">LF</span>
</div>

<script src="node_modules/monaco-editor/dev/vs/loader.js"></script>
<link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css">
<script src="node_modules/@xterm/xterm/lib/xterm.js"></script>
<script src="node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
<script>
const ipcRenderer = window.editorAPI;
const path = { extname: (f) => { const i = f.lastIndexOf('.'); return i >= 0 ? f.slice(i) : ''; }, join: (...args) => args.join('/'), basename: (f) => f.split('/').pop() };

let editor = null;
const openFiles = new Map();
let activeFile = null;

const LANG_MAP = {
    '.js': 'javascript', '.ts': 'typescript', '.jsx': 'javascript', '.tsx': 'typescript',
    '.json': 'json', '.jsonc': 'json', '.html': 'html', '.htm': 'html',
    '.css': 'css', '.scss': 'scss', '.less': 'less',
    '.py': 'python', '.java': 'java', '.c': 'c', '.cpp': 'cpp', '.h': 'c',
    '.cs': 'csharp', '.go': 'go', '.rs': 'rust', '.rb': 'ruby',
    '.php': 'php', '.xml': 'xml', '.yaml': 'yaml', '.yml': 'yaml',
    '.md': 'markdown', '.sql': 'sql', '.sh': 'shell', '.bat': 'bat',
    '.ps1': 'powershell', '.toml': 'ini', '.ini': 'ini', '.cfg': 'ini',
    '.properties': 'properties', '.gradle': 'groovy', '.kt': 'kotlin',
    '.lua': 'lua', '.dart': 'dart', '.swift': 'swift',
    '.vue': 'html', '.svelte': 'html'
};

function getLang(filePath) {
    const ext = path.extname(filePath).toLowerCase();
    return LANG_MAP[ext] || 'plaintext';
}

require.config({ paths: { vs: 'node_modules/monaco-editor/dev/vs' } });
require(['vs/editor/editor.main'], function () {
    monaco.editor.defineTheme('versepc-dark', {
        base: 'vs-dark',
        inherit: true,
        rules: [
            { token: 'comment', foreground: '6A9955', fontStyle: 'italic' },
            { token: 'keyword', foreground: '569CD6' },
            { token: 'string', foreground: 'CE9178' },
            { token: 'number', foreground: 'B5CEA8' },
            { token: 'type', foreground: '4EC9B0' }
        ],
        colors: {
            'editor.background': '#1e1e1e',
            'editor.foreground': '#d4d4d4',
            'editorLineNumber.foreground': '#858585',
            'editorCursor.foreground': '#d4d4d4',
            'editor.selectionBackground': '#264f78',
            'editor.lineHighlightBackground': '#2a2d2e',
            'editorIndentGuide.background': '#404040',
            'editorWidget.background': '#252526',
            'editorSuggestWidget.background': '#252526',
            'sideBar.background': '#252526',
            'statusBar.background': '#007acc'
        }
    });

    editor = monaco.editor.create(document.getElementById('editorContainer'), {
        value: '',
        language: 'plaintext',
        theme: 'versepc-dark',
        automaticLayout: true,
        fontSize: 14,
        fontFamily: "'Cascadia Code', 'Fira Code', Consolas, 'Courier New', monospace",
        fontLigatures: true,
        minimap: { enabled: true, maxColumn: 80 },
        scrollBeyondLastLine: false,
        renderWhitespace: 'selection',
        bracketPairColorization: { enabled: true },
        guides: { bracketPairs: true },
        smoothScrolling: true,
        cursorBlinking: 'smooth',
        cursorSmoothCaretAnimation: 'on',
        wordWrap: 'off',
        tabSize: 4,
        insertSpaces: true,
        renderLineHighlight: 'all',
        occurrencesHighlight: 'singleFile',
        folding: true,
        foldingStrategy: 'indentation',
        showFoldingControls: 'mouseover',
        contextmenu: true,
        mouseWheelZoom: true,
        glyphMargin: true
    });

    editor.onDidChangeCursorPosition((e) => {
        document.getElementById('statusPos').textContent = `Ln ${e.position.lineNumber}, Col ${e.position.column}`;
    });

    editor.addAction({
        id: 'send-to-ai',
        label: '发送到 AI 修改',
        keybindings: [monaco.KeyMod.CtrlCmd | monaco.KeyMod.Shift | monaco.KeyCode.KeyI],
        contextMenuGroupId: 'navigation',
        contextMenuOrder: 1.5,
        run: function(ed) {
            const selection = ed.getSelection();
            if (!selection || selection.isEmpty()) return;
            const model = ed.getModel();
            const selectedText = model.getValueInRange(selection);
            if (!selectedText.trim()) return;
            const filePath = activeFile || '';
            const language = model.getLanguageId();
            const startLine = selection.startLineNumber;
            const endLine = selection.endLineNumber;
            window.parent.postMessage({
                type: 'editor:send-to-ai',
                selectedText: selectedText,
                filePath: filePath,
                language: language,
                startLine: startLine,
                endLine: endLine,
                totalLines: model.getLineCount()
            }, '*');
        }
    });

    editor.onDidChangeModelContent(() => {
        if (activeFile && openFiles.has(activeFile)) {
            const data = openFiles.get(activeFile);
            data.modified = true;
            updateTabUI();
        }
    });

    editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, () => {
        saveCurrentFile();
    });

    editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyP, () => {
        openFile();
    });

    editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyO, () => {
        openFile();
    });

    const container = document.getElementById('editorContainer');
    container.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; });
    container.addEventListener('drop', (e) => {
        e.preventDefault();
        const filePath = e.dataTransfer.getData('text/uri-list') || e.dataTransfer.getData('text/plain');
        if (filePath) loadFile(filePath.replace('file:///', '').replace(/\//g, '\\'));
    });

    let _completionEnabled = true;
    let _completionAbortController = null;
    let _completionDebounceTimer = null;

    const completionProvider = languages.registerInlineCompletionsProvider('*', {
        provideInlineCompletions: async (model, position, context, token) => {
            if (!_completionEnabled) return { items: [] };

            const lineContent = model.getLineContent(position.lineNumber);
            const beforeCursor = lineContent.substring(0, position.column - 1);
            const trimmed = beforeCursor.trimStart();
            if (trimmed.startsWith('//') || trimmed.startsWith('#') || trimmed.startsWith('/*') || trimmed.startsWith('*')) {
                return { items: [] };
            }

            if (_completionDebounceTimer) clearTimeout(_completionDebounceTimer);

            return new Promise((resolve) => {
                _completionDebounceTimer = setTimeout(async () => {
                    if (_completionAbortController) _completionAbortController.abort();
                    _completionAbortController = new AbortController();

                    if (token.isCancellationRequested) { resolve({ items: [] }); return; }

                    const prefix = model.getValueInRange({
                        startLineNumber: 1, startColumn: 1,
                        endLineNumber: position.lineNumber, endColumn: position.column
                    });

                    const suffix = model.getValueInRange({
                        startLineNumber: position.lineNumber, startColumn: position.column,
                        endLineNumber: model.getLineCount(),
                        endColumn: model.getLineMaxColumn(model.getLineCount())
                    });

                    const language = model.getLanguageId();
                    const filePath = activeFile || '';

                    try {
                        const result = await ipcRenderer.codeComplete({
                            prefix, suffix, language, filePath
                        });

                        if (token.isCancellationRequested || !result || !result.text) {
                            resolve({ items: [] });
                            return;
                        }

                        const text = result.text;
                        if (!text || text.length === 0) { resolve({ items: [] }); return; }

                        resolve({
                            items: [{
                                insertText: text,
                                range: new monaco.Range(
                                    position.lineNumber, position.column,
                                    position.lineNumber, position.column
                                )
                            }]
                        });
                    } catch (e) {
                        resolve({ items: [] });
                    }
                }, 500);
            });
        },
        freeInlineCompletions: (completions) => {}
    });

    editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyMod.Shift | monaco.KeyCode.Space, () => {
        _completionEnabled = !_completionEnabled;
        const status = document.getElementById('statusCompletion');
        if (status) status.textContent = _completionEnabled ? 'AI 补全' : '补全关';
    });

    document.getElementById('statusCompletion')?.addEventListener('click', () => {
        _completionEnabled = !_completionEnabled;
        const status = document.getElementById('statusCompletion');
        if (status) status.textContent = _completionEnabled ? 'AI 补全' : '补全关';
    });
});

async function openFile() {
    const filePath = await ipcRenderer.openFileDialog();
    if (filePath) loadFile(filePath);
}

async function loadFile(filePath) {
    if (!filePath) return;
    if (openFiles.has(filePath)) {
        switchToFile(filePath);
        return;
    }
    const result = await ipcRenderer.readFile(filePath);
    if (result.error) {
        alert('无法读取文件: ' + result.error);
        return;
    }
    const lang = getLang(filePath);
    const model = monaco.editor.createModel(result.content, lang);
    openFiles.set(filePath, { model, lang, filePath, modified: false, content: result.content });
    switchToFile(filePath);
    document.getElementById('welcomeScreen')?.remove();
}

function switchToFile(filePath) {
    const data = openFiles.get(filePath);
    if (!data || !editor) return;
    editor.setModel(data.model);
    activeFile = filePath;
    document.getElementById('statusLang').textContent = data.lang;
    updateTabUI();
}

function closeFile(filePath) {
    const data = openFiles.get(filePath);
    if (!data) return;
    if (data.modified && !confirm(`"${path.basename(filePath)}" 已修改，确定关闭？`)) return;
    data.model.dispose();
    openFiles.delete(filePath);
    if (activeFile === filePath) {
        const remaining = Array.from(openFiles.keys());
        if (remaining.length > 0) switchToFile(remaining[remaining.length - 1]);
        else {
            activeFile = null;
            editor.setModel(null);
            const welcome = document.createElement('div');
            welcome.className = 'welcome';
            welcome.id = 'welcomeScreen';
            welcome.innerHTML = '<h2>VersePC Editor</h2><p>拖拽文件到此处，或点击 📂 打开 加载文件</p>';
            document.getElementById('editorContainer').appendChild(welcome);
        }
    }
    updateTabUI();
}

async function saveCurrentFile() {
    if (!activeFile) return;
    const data = openFiles.get(activeFile);
    if (!data) return;
    const content = data.model.getValue();
    const result = await ipcRenderer.writeFile(activeFile, content);
    if (result.error) {
        alert('保存失败: ' + result.error);
        return;
    }
    data.modified = false;
    data.content = content;
    clearAILines();
    updateTabUI();
}

function updateTabUI() {
    const bar = document.getElementById('tabsBar');
    bar.innerHTML = '';
    for (const [filePath, data] of openFiles) {
        const tab = document.createElement('div');
        tab.className = 'tab' + (filePath === activeFile ? ' active' : '') + (data.modified ? ' modified' : '');
        const name = path.basename(filePath);
        tab.innerHTML = `<span class="modified-dot"></span><span style="overflow:hidden;text-overflow:ellipsis">${name}</span><button class="tab-close" title="关闭">×</button>`;
        tab.addEventListener('click', (e) => {
            if (e.target.classList.contains('tab-close')) { closeFile(filePath); return; }
            switchToFile(filePath);
        });
        bar.appendChild(tab);
    }
}

ipcRenderer.onOpenFile((filePath) => {
    loadFile(filePath);
});

ipcRenderer.onUpdateContent((filePath, newContent) => {
    if (openFiles.has(filePath)) {
        const data = openFiles.get(filePath);
        data.model.setValue(newContent);
    } else {
        loadFile(filePath);
    }
});

let diffEditor = null;
let diffOriginalModel = null;
let diffModifiedModel = null;
let diffPendingPath = null;
let aiDecorationsCollection = null;
let aiModifiedRanges = [];

function computeDiffLines(original, modified) {
    const oldLines = (original || '').split('\n');
    const newLines = (modified || '').split('\n');
    const changedNewLines = new Set();
    const maxLen = Math.max(oldLines.length, newLines.length);
    let i = 0, j = 0;
    const lcs = [];
    const oldMap = new Map();
    for (let x = 0; x < oldLines.length; x++) {
        if (!oldMap.has(oldLines[x])) oldMap.set(oldLines[x], []);
        oldMap.get(oldLines[x]).push(x);
    }
    const dp = Array(oldLines.length + 1).fill(null).map(() => Array(newLines.length + 1).fill(0));
    for (let x = 1; x <= oldLines.length; x++) {
        for (let y = 1; y <= newLines.length; y++) {
            if (oldLines[x - 1] === newLines[y - 1]) dp[x][y] = dp[x - 1][y - 1] + 1;
            else dp[x][y] = Math.max(dp[x - 1][y], dp[x][y - 1]);
        }
    }
    let x = oldLines.length, y = newLines.length;
    while (x > 0 && y > 0) {
        if (oldLines[x - 1] === newLines[y - 1]) { x--; y--; }
        else if (dp[x - 1][y] > dp[x][y - 1]) x--;
        else { changedNewLines.add(y); y--; }
    }
    while (y > 0) { changedNewLines.add(y); y--; }
    return changedNewLines;
}

function highlightAILines(original, modified) {
    if (!editor || !activeFile) return;
    const changedLines = computeDiffLines(original, modified);
    aiModifiedRanges = [];
    for (const lineNum of changedLines) {
        aiModifiedRanges.push({
            range: new monaco.Range(lineNum, 1, lineNum, 1),
            options: {
                isWholeLine: true,
                className: 'ai-modified-line',
                glyphMarginClassName: 'ai-modified-glyph',
                glyphMarginHoverMessage: { value: '**AI 修改**' },
                overviewRuler: { color: '#60a5fa80', position: monaco.editor.OverviewRulerLane.Left }
            }
        });
    }
    if (aiDecorationsCollection) aiDecorationsCollection.clear();
    if (aiModifiedRanges.length > 0) {
        aiDecorationsCollection = editor.createDecorationsCollection(aiModifiedRanges);
    }
    const mark = document.getElementById('statusAIMark');
    if (mark) { mark.style.display = ''; mark.textContent = `● AI 修改 (${changedLines.length} 行)`; }
}

function clearAILines() {
    if (aiDecorationsCollection) { aiDecorationsCollection.clear(); aiDecorationsCollection = null; }
    aiModifiedRanges = [];
    const mark = document.getElementById('statusAIMark');
    if (mark) mark.style.display = 'none';
}

function showDiff(filePath, original, modified) {
    if (!editor) return;
    document.getElementById('welcomeScreen')?.remove();
    const lang = getLang(filePath);
    diffPendingPath = filePath;
    if (diffOriginalModel) diffOriginalModel.dispose();
    if (diffModifiedModel) diffModifiedModel.dispose();
    diffOriginalModel = monaco.editor.createModel(original, lang);
    diffModifiedModel = monaco.editor.createModel(modified, lang);
    const currentModel = editor.getModel();
    editor.setModel(null);
    if (diffEditor) { diffEditor.dispose(); diffEditor = null; }
    diffEditor = monaco.editor.createDiffEditor(document.getElementById('editorContainer'), {
        automaticLayout: true,
        theme: 'versepc-dark',
        readOnly: true,
        renderSideBySide: true,
        fontSize: 14,
        fontFamily: "'Cascadia Code', 'Fira Code', Consolas, 'Courier New', monospace",
        minimap: { enabled: false },
        scrollBeyondLastLine: false
    });
    diffEditor.setModel({ original: diffOriginalModel, modified: diffModifiedModel });
    document.getElementById('diffFileName').textContent = path.basename(filePath);
    document.getElementById('diffToolbar').classList.add('visible');
}

function closeDiff() {
    if (diffEditor) { diffEditor.dispose(); diffEditor = null; }
    if (diffOriginalModel) { diffOriginalModel.dispose(); diffOriginalModel = null; }
    if (diffModifiedModel) { diffModifiedModel.dispose(); diffModifiedModel = null; }
    diffPendingPath = null;
    document.getElementById('diffToolbar').classList.remove('visible');
    if (activeFile && openFiles.has(activeFile)) {
        editor.setModel(openFiles.get(activeFile).model);
    }
}

async function acceptDiff() {
    if (!diffPendingPath || !diffModifiedModel) return;
    const origContent = diffOriginalModel.getValue();
    const newContent = diffModifiedModel.getValue();
    const result = await ipcRenderer.writeFile(diffPendingPath, newContent);
    if (result.error) { alert('保存失败: ' + result.error); return; }
    if (openFiles.has(diffPendingPath)) {
        openFiles.get(diffPendingPath).model.setValue(newContent);
        openFiles.get(diffPendingPath).modified = false;
        openFiles.get(diffPendingPath).content = newContent;
    } else {
        const lang = getLang(diffPendingPath);
        const model = monaco.editor.createModel(newContent, lang);
        openFiles.set(diffPendingPath, { model, lang, filePath: diffPendingPath, modified: false, content: newContent });
    }
    closeDiff();
    switchToFile(diffPendingPath);
    highlightAILines(origContent, newContent);
}

function applyDiff() {
    if (!diffPendingPath || !diffModifiedModel) return;
    const origContent = diffOriginalModel.getValue();
    const newContent = diffModifiedModel.getValue();
    if (openFiles.has(diffPendingPath)) {
        openFiles.get(diffPendingPath).model.setValue(newContent);
        openFiles.get(diffPendingPath).modified = true;
    } else {
        const lang = getLang(diffPendingPath);
        const model = monaco.editor.createModel(newContent, lang);
        openFiles.set(diffPendingPath, { model, lang, filePath: diffPendingPath, modified: true, content: newContent });
    }
    closeDiff();
    switchToFile(diffPendingPath);
    highlightAILines(origContent, newContent);
}

function rejectDiff() { closeDiff(); clearAILines(); }

ipcRenderer.onShowDiff((filePath, original, modified) => {
    showDiff(filePath, original, modified);
});

window.addEventListener('message', (event) => {
    if (event.data && event.data.type === 'editor:show-diff') {
        showDiff(event.data.filePath, event.data.original, event.data.modified);
    }
    if (event.data && event.data.type === 'editor:refresh-explorer') {
        refreshFileExplorer(event.data.dirPath);
    }
    if (event.data && event.data.type === 'editor:open-file') {
        loadFile(event.data.filePath);
    }
});

let xtermInstance = null;
let fitAddon = null;
let terminalSessionId = null;
let _terminalOpen = false;

function toggleTerminal() {
    const panel = document.getElementById('terminalPanel');
    const btn = document.getElementById('btnTerminalToggle');
    const statusBtn = document.getElementById('btnTerminalStatus');
    _terminalOpen = !_terminalOpen;
    panel.classList.toggle('open', _terminalOpen);
    if (btn) btn.classList.toggle('active', _terminalOpen);
    if (statusBtn) statusBtn.classList.toggle('active', _terminalOpen);
    if (_terminalOpen && !xtermInstance) initTerminal();
    if (fitAddon) setTimeout(() => fitAddon.fit(), 50);
}

function initTerminal() {
    if (xtermInstance) return;
    const body = document.getElementById('terminalBody');
    const hint = document.getElementById('terminalHint');
    if (hint) hint.style.display = 'none';
    xtermInstance = new Terminal({
        theme: { background: '#1e1e1e', foreground: '#d4d4d4', cursor: '#d4d4d4', selectionBackground: '#264f78', black: '#000', red: '#cd3131', green: '#00bc00', yellow: '#949800', blue: '#0451a5', magenta: '#bc05bc', cyan: '#0598bc', white: '#555', brightBlack: '#666', brightRed: '#f14c4c', brightGreen: '#23d18b', brightYellow: '#f5f543', brightBlue: '#0451a5', brightMagenta: '#bc05bc', brightCyan: '#0598bc', brightWhite: '#a5a5a5' },
        fontSize: 13,
        fontFamily: "'Cascadia Code', 'Fira Code', Consolas, monospace",
        cursorBlink: true,
        scrollback: 5000
    });
    fitAddon = new FitAddon.FitAddon();
    xtermInstance.loadAddon(fitAddon);
    xtermInstance.open(body);
    fitAddon.fit();
    terminalSessionId = 'term-' + Date.now();
    ipcRenderer.createTerminal(terminalSessionId, xtermInstance.cols, xtermInstance.rows);
    xtermInstance.onData((data) => {
        ipcRenderer.writeTerminal(terminalSessionId, data);
    });
    ipcRenderer.onTerminalData((id, data) => {
        if (id === terminalSessionId && xtermInstance) xtermInstance.write(data);
    });
    ipcRenderer.onTerminalExit((id, code) => {
        if (id === terminalSessionId && xtermInstance) {
            xtermInstance.write(`\r\n\x1b[33m[进程已退出，代码 ${code}]\x1b[0m\r\n`);
        }
    });
    xtermInstance.focus();
    window.addEventListener('resize', () => { if (fitAddon) fitAddon.fit(); });
}

function clearTerminal() {
    if (xtermInstance) xtermInstance.clear();
}

function createTerminal() {
    if (terminalSessionId) {
        ipcRenderer.killTerminal(terminalSessionId);
    }
    if (xtermInstance) { xtermInstance.dispose(); xtermInstance = null; fitAddon = null; }
    terminalSessionId = null;
    initTerminal();
}

(function initTerminalDrag() {
    const handle = document.getElementById('terminalDragHandle');
    const panel = document.getElementById('terminalPanel');
    if (!handle || !panel) return;
    let dragging = false, startY = 0, startHeight = 0;
    handle.addEventListener('mousedown', (e) => {
        e.preventDefault();
        dragging = true;
        startY = e.clientY;
        startHeight = panel.offsetHeight;
        document.body.style.cursor = 'row-resize';
        document.body.style.userSelect = 'none';
    });
    document.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const newHeight = Math.max(100, Math.min(startHeight + (startY - e.clientY), window.innerHeight * 0.6));
        panel.style.height = newHeight + 'px';
        panel.style.transition = 'none';
        if (fitAddon) fitAddon.fit();
    });
    document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        panel.style.transition = '';
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
    });
})();

let _quickOpenFiles = [];
let _quickOpenSelected = 0;
let _quickOpenVisible = false;

function showQuickOpen() {
    const overlay = document.getElementById('quickopenOverlay');
    const input = document.getElementById('quickopenInput');
    overlay.classList.add('visible');
    _quickOpenVisible = true;
    input.value = '';
    _quickOpenSelected = 0;
    scanProjectFiles().then(files => {
        _quickOpenFiles = files;
        renderQuickOpenList('');
    });
    input.focus();
    input.addEventListener('input', () => { _quickOpenSelected = 0; renderQuickOpenList(input.value); });
    input.addEventListener('keydown', quickOpenKeydown);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) hideQuickOpen(); });
}

function hideQuickOpen() {
    const overlay = document.getElementById('quickopenOverlay');
    overlay.classList.remove('visible');
    _quickOpenVisible = false;
}

function quickOpenKeydown(e) {
    const items = document.querySelectorAll('.quickopen-item');
    if (e.key === 'Escape') { hideQuickOpen(); e.preventDefault(); return; }
    if (e.key === 'ArrowDown') { _quickOpenSelected = Math.min(_quickOpenSelected + 1, items.length - 1); updateQuickOpenSelection(items); e.preventDefault(); }
    if (e.key === 'ArrowUp') { _quickOpenSelected = Math.max(_quickOpenSelected - 1, 0); updateQuickOpenSelection(items); e.preventDefault(); }
    if (e.key === 'Enter' && items[_quickOpenSelected]) {
        const fp = items[_quickOpenSelected].getAttribute('data-path');
        if (fp) loadFile(fp);
        hideQuickOpen();
        e.preventDefault();
    }
}

function updateQuickOpenSelection(items) {
    items.forEach((el, i) => el.classList.toggle('selected', i === _quickOpenSelected));
    if (items[_quickOpenSelected]) items[_quickOpenSelected].scrollIntoView({ block: 'nearest' });
}

function renderQuickOpenList(query) {
    const list = document.getElementById('quickopenList');
    const q = query.toLowerCase();
    const filtered = q ? _quickOpenFiles.filter(f => f.name.toLowerCase().includes(q) || f.path.toLowerCase().includes(q)) : _quickOpenFiles;
    if (!filtered.length) { list.innerHTML = '<div class="quickopen-empty">未找到匹配的文件</div>'; return; }
    list.innerHTML = filtered.slice(0, 50).map((f, i) => {
        const icon = getFileIcon(f.name);
        return `<div class="quickopen-item${i === 0 ? ' selected' : ''}" data-path="${f.path}"><span class="qo-icon">${icon}</span><span>${f.name}</span><span class="qo-path">${f.rel}</span></div>`;
    }).join('');
    _quickOpenSelected = 0;
    list.querySelectorAll('.quickopen-item').forEach(el => {
        el.addEventListener('click', () => { loadFile(el.getAttribute('data-path')); hideQuickOpen(); });
    });
}

function getFileIcon(name) {
    const ext = name.split('.').pop().toLowerCase();
    const icons = { js: '📜', ts: '📘', json: '📋', html: '🌐', css: '🎨', py: '🐍', java: '☕', md: '📝', yml: '⚙️', yaml: '⚙️', toml: '⚙️', ini: '⚙️', sh: '🖥️', bat: '🖥️', txt: '📄', log: '📄' };
    return icons[ext] || '📄';
}

async function scanProjectFiles() {
    try {
        const result = await ipcRenderer.scanDir('.');
        return result || [];
    } catch (e) { return []; }
}

async function refreshFileExplorer(dirPath) {
    const list = document.getElementById('fileexplorer-list');
    if (!list) return;
    try {
        const files = await ipcRenderer.scanDir(dirPath || '.');
        if (!files || !files.length) { list.innerHTML = '<div class="editor-fileexplorer-empty">空目录</div>'; return; }
        list.innerHTML = files.map(f => {
            const icon = f.isDir ? '📁' : getFileIcon(f.name);
            return `<div class="editor-fileexplorer-item" data-path="${f.path}" data-isdir="${f.isDir}"><span class="icon">${icon}</span><span>${f.name}</span></div>`;
        }).join('');
        list.querySelectorAll('.editor-fileexplorer-item').forEach(el => {
            el.addEventListener('click', () => {
                const p = el.getAttribute('data-path');
                const isDir = el.getAttribute('data-isdir') === 'true';
                if (isDir) refreshFileExplorer(p);
                else loadFile(p);
            });
        });
    } catch (e) {
        list.innerHTML = '<div class="editor-fileexplorer-empty">无法读取目录</div>';
    }
}

document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
        e.preventDefault();
        if (_quickOpenVisible) hideQuickOpen();
        else showQuickOpen();
    }
    if (e.key === 'Escape' && _quickOpenVisible) {
        hideQuickOpen();
        e.preventDefault();
    }
    if ((e.ctrlKey || e.metaKey) && e.key === '`') {
        e.preventDefault();
        toggleTerminal();
    }
});

function sendSelectionToAI() {
    if (!editor) return;
    const selection = editor.getSelection();
    if (!selection || selection.isEmpty()) {
        const msg = document.getElementById('editor-toast');
        if (msg) { msg.textContent = '请先选中代码'; msg.classList.add('show'); setTimeout(() => msg.classList.remove('show'), 2000); }
        return;
    }
    const model = editor.getModel();
    const selectedText = model.getValueInRange(selection);
    if (!selectedText.trim()) return;
    window.parent.postMessage({
        type: 'editor:send-to-ai',
        selectedText: selectedText,
        filePath: activeFile || '',
        language: model.getLanguageId(),
        startLine: selection.startLineNumber,
        endLine: selection.endLineNumber,
        totalLines: model.getLineCount()
    }, '*');
    const msg = document.getElementById('editor-toast');
    if (msg) { msg.textContent = '已发送到 AI'; msg.classList.add('show'); setTimeout(() => msg.classList.remove('show'), 2000); }
}
