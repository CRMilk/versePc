name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_mac:
        description: 'Build macOS version'
        type: boolean
        default: true
      build_win:
        description: 'Build Windows version'
        type: boolean
        default: true
      build_linux:
        description: 'Build Linux version'
        type: boolean
        default: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: 
          - ${{ fromJSON(inputs.build_win && '["windows-latest"]' || '[]') }}
          - ${{ fromJSON(inputs.build_mac && '["macos-latest"]' || '[]') }}
          - ${{ fromJSON(inputs.build_linux && '["ubuntu-latest"]' || '[]') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: dist/

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.deb
            dist/*.rpm
            dist/*.AppImage
            dist/*.zip
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}